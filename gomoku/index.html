<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>五子棋 v3.1</title>
<style>
  :root { --pink: #f8a5c2; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: linear-gradient(135deg, #fce4ec, #fff0f5, #fce4ec);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
    overflow-x: hidden; user-select: none; -webkit-user-select: none;
  }
  .screen { width: 100%; max-width: 500px; padding: 8px; display: none; flex-direction: column; align-items: center; }
  .screen.active { display: flex; }

  /* Home */
  .home-icon { font-size: 44px; margin: 16px 0 4px; }
  .home-title { font-size: 24px; font-weight: 700; color: #e87890; letter-spacing: 4px; margin-bottom: 28px; }
  .big-btn {
    width: 100%; max-width: 280px; border: none; border-radius: 50px; padding: 18px;
    font-size: 20px; font-weight: 700; letter-spacing: 2px; cursor: pointer;
    margin: 6px 0; transition: all .2s; font-family: inherit;
    box-shadow: 0 6px 20px rgba(255,140,160,0.25);
  }
  .big-btn:active { transform: scale(0.95); }
  .big-btn.pink { background: linear-gradient(135deg, #f8a5c2, #e87890); color: #fff; }
  .big-btn.white { background: #fff; color: #e87890; border: 3px solid #f8a5c2; }
  .home-hint { margin-top: 20px; font-size: 11px; color: #d4a0b0; letter-spacing: 1px; }

  /* Game */
  .top-bar {
    display: flex; align-items: center; width: 100%; margin-bottom: 4px;
  }
  .btn-back {
    background: rgba(255,255,255,0.6); border: none; border-radius: 50%;
    width: 36px; height: 36px; font-size: 18px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .btn-back:active { transform: scale(0.9); }
  .top-title {
    flex: 1; text-align: center; font-size: 17px; font-weight: 700; color: #e87890; letter-spacing: 2px;
  }
  .board-wrap {
    background: rgba(255,255,255,0.5); border-radius: 24px; padding: 4px;
    box-shadow: 0 8px 32px rgba(255,140,160,0.18);
    display: flex; align-items: center; justify-content: center;
  }
  canvas { display: block; border-radius: 12px; touch-action: manipulation; }

  .status {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.6); border-radius: 14px; padding: 5px 14px;
    width: 100%; justify-content: center; font-weight: 600; font-size: 13px; color: #c96a7e;
    box-shadow: 0 2px 10px rgba(255,140,160,0.12); margin: 5px 0;
  }
  .dot { width: 20px; height: 20px; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.18); }
  .dot.b { background: radial-gradient(circle at 35% 35%, #555, #111 60%, #000); }
  .dot.w { background: radial-gradient(circle at 35% 35%, #fff, #e0e0e0 60%, #bbb); }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; }
  .btn {
    border: none; border-radius: 22px; padding: 9px 18px; font-size: 13px;
    font-weight: 600; letter-spacing: 1px; cursor: pointer; font-family: inherit;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08); transition: all .15s;
  }
  .btn:active { transform: scale(0.95); }
  .btn-undo { background: #ffe0e6; color: #d4687c; }
  .btn-reset { background: #ffd1dc; color: #c06070; }

  /* Online panel */
  .online-box {
    background: rgba(255,255,255,0.7); border-radius: 18px; padding: 14px; width: 100%;
    box-shadow: 0 4px 14px rgba(255,140,160,0.12); display: none; flex-direction: column; gap: 8px; align-items: center;
  }
  .online-box.show { display: flex; }
  .inp-row { display: flex; gap: 8px; width: 100%; }
  .inp-row input {
    flex: 1; border: 2px solid #f8a5c2; border-radius: 18px; padding: 8px 12px;
    font-size: 14px; outline: none; font-family: inherit; text-align: center; letter-spacing: 2px;
  }
  .btn-sm {
    border: none; border-radius: 18px; padding: 7px 14px; font-size: 12px;
    font-weight: 600; cursor: pointer; font-family: inherit;
    background: linear-gradient(135deg, #f8a5c2, #e87890); color: #fff;
    box-shadow: 0 2px 6px rgba(255,140,160,0.3); white-space: nowrap;
  }
  .btn-sm:active { transform: scale(0.95); }
  .btn-sm.outline { background: #fff; color: #e87890; border: 2px solid #f8a5c2; }
  .room-code {
    background: #ffe0e6; padding: 4px 14px; border-radius: 12px;
    font-size: 17px; letter-spacing: 3px; font-weight: 700; color: #c06070; word-break: break-all;
  }
  .tag { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
  .tag.green { background: #d4edda; color: #2d7a3f; }
  .tag.yellow { background: #fff3cd; color: #856404; animation: pulse 1.5s infinite; }
  .tag.red { background: #f8d7da; color: #721c24; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Overlays */
  .toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.82); color: #fff; padding: 10px 22px;
    border-radius: 22px; font-size: 13px; z-index: 9999; pointer-events: none;
    opacity: 0; transition: opacity .3s;
  }
  .toast.show { opacity: 1; }
  .modal-ov {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100;
    display: none; align-items: center; justify-content: center;
  }
  .modal-ov.show { display: flex; }
  .modal {
    background: #fff; border-radius: 22px; padding: 22px; text-align: center;
    max-width: 300px; width: 88%; box-shadow: 0 12px 36px rgba(0,0,0,0.2);
  }
  .modal h3 { color: #e87890; margin-bottom: 4px; font-size: 18px; }
  .modal p { color: #666; margin-bottom: 12px; font-size: 13px; }
  .win-ov {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200;
    display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
  }
  .win-ov.show { display: flex; }
  .win-txt {
    font-size: 32px; font-weight: 900; color: #fff;
    text-shadow: 0 0 18px rgba(255,215,0,0.8), 0 4px 8px rgba(0,0,0,0.3);
    animation: pop .5s ease-out;
  }
  @keyframes pop { 0%{transform:scale(0);opacity:0} 70%{transform:scale(1.12)} 100%{transform:scale(1);opacity:1} }

  @media (max-width: 380px) {
    .home-icon { font-size: 34px; }
    .home-title { font-size: 20px; }
    .big-btn { font-size: 17px; padding: 14px; max-width: 240px; }
    .btn { padding: 7px 12px; font-size: 11px; }
  }
</style>
</head>
<body>

<!-- ===== HOME ===== -->
<div class="screen active" id="home">
  <div class="home-icon">🀄️</div>
  <div class="home-title">五 子 棋</div>
  <button class="big-btn pink" onclick="startGame('local')">👥 本地对战</button>
  <button class="big-btn white" onclick="startGame('online')">🌐 在线联机</button>
  <div class="home-hint">同一设备 · 或 · 远程连线<br><span style="color:#d0a0b0;">v3.1 · MQTT联机</span></div>
</div>

<!-- ===== GAME ===== -->
<div class="screen" id="game">
  <div class="top-bar">
    <button class="btn-back" onclick="goHome()">←</button>
    <div class="top-title" id="topTitle">本地对战</div>
    <div style="width:36px;"></div>
  </div>

  <div class="board-wrap"><canvas id="board"></canvas></div>

  <div class="status">
    <div class="dot b" id="turnDot"></div>
    <span id="turnText">⚫ 黑棋回合</span>
    <span style="font-size:10px;color:#b0a0a8;" id="handCount">第 0 手</span>
  </div>

  <div class="btn-row" id="btnRow">
    <button class="btn btn-undo" onclick="clickUndo()">↩ 悔棋</button>
    <button class="btn btn-reset" onclick="clickReset()">🔄 重新开始</button>
  </div>

  <div class="online-box" id="onlineBox">
    <div id="onlineInit" style="display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;">
      <div class="btn-row">
        <button class="btn-sm" onclick="createRoom()">🏠 创建房间</button>
        <button class="btn-sm outline" onclick="toggleJoin()">🚪 加入房间</button>
      </div>
      <div class="inp-row" id="joinRow" style="display:none;">
        <input id="roomInp" placeholder="输入6位房间号" maxlength="6" autocomplete="off">
        <button class="btn-sm" onclick="joinRoom()">加入</button>
      </div>
    </div>
    <div id="onlineInfo" style="display:none;flex-direction:column;gap:6px;width:100%;align-items:center;">
      <div class="room-code" id="roomCode"></div>
      <div id="tagArea"></div>
      <div class="btn-row">
        <button class="btn-sm outline" id="btnCopy" onclick="copyRoom()">📋 复制房间号</button>
        <button class="btn-sm" style="background:#ffd1dc;color:#c06070;" onclick="leaveOnline()">🚪 离开</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== OVERLAYS ===== -->
<div class="toast" id="toast"></div>
<div class="modal-ov" id="undoModal">
  <div class="modal">
    <h3>🤔 对手请求悔棋</h3>
    <p>是否同意？</p>
    <div class="btn-row">
      <button class="btn btn-undo" style="background:#f8a5c2;color:#fff;" onclick="replyUndo(true)">✅ 同意</button>
      <button class="btn btn-reset" onclick="replyUndo(false)">❌ 拒绝</button>
    </div>
  </div>
</div>
<div class="win-ov" id="winOverlay">
  <div class="win-txt" id="winText"></div>
  <button class="btn btn-reset" style="background:#fff;font-size:15px;" onclick="clickReset()">🔄 再来一局</button>
</div>

<!-- ===== MQTT ===== -->
<script src="https://cdn.jsdelivr.net/npm/mqtt@4.3.8/dist/mqtt.min.js"></script>
<script>
// ==================== CONST ====================
const N = 15;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

// ==================== STATE ====================
let board, turn, history, over, winner, winCells, last;
let mode = 'local';    // local | online
let myColor = null;
let myTurn = true;

// Online
let client = null;
let roomId = null;
let clientConnected = false;

function fresh() { return Array(N).fill(null).map(() => Array(N).fill(null)); }
function initGame() {
  board = fresh(); turn = 'black'; history = []; over = false;
  winner = null; winCells = []; last = null;
  myTurn = (mode === 'local' || myColor === 'black');
  document.getElementById('winOverlay').classList.remove('show');
}

// ==================== CANVAS ====================
let sz, cs, pd;
function recompute() {
  const mx = window.innerWidth - 16;
  const my = window.innerHeight * 0.58;
  sz = Math.floor(Math.min(mx, my));
  cs = (sz * 0.92) / (N - 1);
  pd = (sz - cs * (N - 1)) / 2;
}
function cx(c) { return pd + c * cs; }
function cy(r) { return pd + r * cs; }

function resize() {
  recompute();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.style.width = sz + 'px'; canvas.style.height = sz + 'px';
  canvas.width = sz * dpr; canvas.height = sz * dpr;
  ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(dpr, dpr);
  render();
}

function render() {
  recompute();
  ctx.clearRect(0, 0, sz, sz);

  // Board
  const g = ctx.createLinearGradient(0, 0, sz, sz);
  g.addColorStop(0,'#f5e6d3'); g.addColorStop(0.5,'#faf0e0'); g.addColorStop(1,'#f0dcc0');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.roundRect(pd - cs * 0.4, pd - cs * 0.4, cs * (N - 1) + cs * 0.8, cs * (N - 1) + cs * 0.8, 10); ctx.fill();

  ctx.strokeStyle = '#c8a882'; ctx.lineWidth = 1;
  for (let i = 0; i < N; i++) {
    ctx.beginPath(); ctx.moveTo(cx(0), cy(i)); ctx.lineTo(cx(N - 1), cy(i)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx(i), cy(0)); ctx.lineTo(cx(i), cy(N - 1)); ctx.stroke();
  }

  // Stars
  [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]].forEach(([r,c]) => {
    ctx.fillStyle = '#c8a882'; ctx.beginPath(); ctx.arc(cx(c), cy(r), cs * 0.12, 0, Math.PI * 2); ctx.fill();
  });

  // Win cells
  if (winCells.length) {
    winCells.forEach(({r,c}) => {
      ctx.fillStyle = 'rgba(255,215,0,0.45)';
      ctx.beginPath(); ctx.arc(cx(c), cy(r), cs * 0.5, 0, Math.PI * 2); ctx.fill();
    });
  }

  // Pieces
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    if (!board[r][c]) continue;
    const x = cx(c), y = cy(r), rad = cs * 0.43;
    const pg = ctx.createRadialGradient(x - rad * 0.3, y - rad * 0.3, rad * 0.05, x, y, rad);
    if (board[r][c] === 'black') { pg.addColorStop(0,'#666'); pg.addColorStop(0.5,'#333'); pg.addColorStop(1,'#111'); }
    else { pg.addColorStop(0,'#fff'); pg.addColorStop(0.5,'#f0f0f0'); pg.addColorStop(1,'#c0c0c0'); }
    ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2); ctx.fill();
  }

  // Last marker
  if (last && board[last.r]?.[last.c]) {
    const x = cx(last.c), y = cy(last.r);
    ctx.fillStyle = board[last.r][last.c] === 'black' ? '#ff6b6b' : '#e87890';
    ctx.beginPath(); ctx.arc(x, y, cs * 0.12, 0, Math.PI * 2); ctx.fill();
  }
  updateBar();
}

function updateBar() {
  const d = document.getElementById('turnDot');
  const t = document.getElementById('turnText');
  document.getElementById('handCount').textContent = `第 ${history.length} 手`;
  if (over) {
    d.className = 'dot ' + (winner === 'black' ? 'b' : 'w');
    t.textContent = winner === 'black' ? '🏆 黑棋获胜！' : '🏆 白棋获胜！';
  } else {
    d.className = 'dot ' + (turn === 'black' ? 'b' : 'w');
    const nm = turn === 'black' ? '⚫ 黑棋' : '⚪ 白棋';
    t.textContent = (mode === 'online' && !myTurn) ? `等待对手 (${nm})` : `${nm}回合`;
  }
}

// ==================== GAME LOGIC ====================
function place(r, c) {
  if (over) return false;
  if (r < 0 || r >= N || c < 0 || c >= N) return false;
  if (board[r][c]) return false;
  if (mode === 'online' && !myTurn) { toast('还没轮到你～'); return false; }

  board[r][c] = turn;
  history.push({ r, c, p: turn });
  last = { r, c };

  const wl = checkWin(r, c, turn);
  if (wl) {
    over = true; winner = turn; winCells = wl;
    render(); showWin();
    if (mode === 'online') pub('move', { r, c, p: turn, winner: turn });
    return true;
  }

  turn = turn === 'black' ? 'white' : 'black';
  if (mode === 'online') {
    myTurn = false;
    pub('move', { r, c, p: turn === 'black' ? 'white' : 'black' });
  }
  render();
  return true;
}

function checkWin(r, c, p) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr,dc] of dirs) {
    const line = [{r,c}];
    for (let i = 1; i < 5; i++) { const nr = r + dr * i, nc = c + dc * i; if (nr < 0 || nr >= N || nc < 0 || nc >= N || board[nr][nc] !== p) break; line.push({r: nr, c: nc}); }
    for (let i = 1; i < 5; i++) { const nr = r - dr * i, nc = c - dc * i; if (nr < 0 || nr >= N || nc < 0 || nc >= N || board[nr][nc] !== p) break; line.unshift({r: nr, c: nc}); }
    if (line.length >= 5) return line;
  }
  return null;
}

function execUndo() {
  if (!history.length) return false;
  const mv = history.pop();
  board[mv.r][mv.c] = null;
  turn = mv.p;
  last = history.length > 0 ? history[history.length - 1] : null;
  winCells = [];
  if (mode === 'online') myTurn = (myColor === turn);
  render();
  return true;
}

function clickUndo() {
  if (over) { toast('游戏已结束'); return; }
  if (!history.length) { toast('没有可悔的棋'); return; }
  if (mode === 'local') { execUndo(); toast('已悔棋 ↩'); }
  else if (mode === 'online') { pub('undo-req', {}); toast('已发送悔棋请求 📩'); }
}

function replyUndo(ok) {
  document.getElementById('undoModal').classList.remove('show');
  if (ok) execUndo();
  pub('undo-rep', { ok });
}

function clickReset() {
  if (mode === 'online') pub('reset', {});
  initGame(); render();
}

function showWin() {
  const ov = document.getElementById('winOverlay');
  ov.classList.add('show');
  const t = document.getElementById('winText');
  if (mode === 'online') t.textContent = (winner === myColor) ? '🎉 你赢了！' : '😢 你输了';
  else t.textContent = (winner === 'black') ? '🏆 黑棋获胜！' : '🏆 白棋获胜！';
}

// ==================== ONLINE - MQTT ====================
const BROKER = 'wss://broker.emqx.io:8084/mqtt';

function rndId() {
  const ch = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i = 0; i < 6; i++) s += ch[Math.floor(Math.random() * ch.length)];
  return s;
}

function pub(type, payload) {
  if (!client|| !clientConnected || !roomId) return;
  client.publish(`gomoku/${roomId}/${type}`, JSON.stringify(payload), { qos: 1 });
}

function connectMQTT() {
  return new Promise((resolve, reject) => {
    if (client&& clientConnected) { resolve(); return; }
    if (client) { try { client.end(true); } catch(e) {} client = null; clientConnected = false; }

    const clientId = 'gomoku_' + Math.random().toString(36).slice(2, 8);
    client = mqtt.connect(BROKER, {
      clientId,
      keepalive: 30,
      connectTimeout: 8000,
      clean: true,
    });

    const timeout = setTimeout(() => {
      reject(new Error('连接超时，请检查网络'));
    }, 10000);

    client.on('connect', () => {
      clearTimeout(timeout);
      clientConnected = true;
      resolve();
    });

    client.on('error', (err) => {
      clearTimeout(timeout);
      clientConnected = false;
      reject(err);
    });

    client.on('close', () => {
      clientConnected = false;
    });

    client.on('message', (topic, payload) => {
      try {
        const data = JSON.parse(payload.toString());
        const msgType = topic.split('/').pop();
        handleMsg(msgType, data);
      } catch (e) {}
    });
  });
}

function subscribeTopics() {
  if (!client|| !clientConnected || !roomId) return;
  const types = ['move', 'undo-req', 'undo-rep', 'reset', 'joined'];
  types.forEach(t => {
    client.subscribe(`gomoku/${roomId}/${t}`, { qos: 1 });
  });
  setBadge('green', '✅ 已连接');
}

function handleMsg(type, data) {
  switch (type) {
    case 'joined':
      // Other player joined
      setBadge('green', '✅ 对手已加入');
      toast('对手已加入！开始对局 🎮');
      initGame(); render();
      break;

    case 'move':
      if (data.winner) {
        board[data.r][data.c] = data.p;
        history.push({ r: data.r, c: data.c, p: data.p });
        last = { r: data.r, c: data.c };
        over = true; winner = data.winner;
        winCells = checkWin(data.r, data.c, data.winner) || [];
        myTurn = false;
        render(); showWin();
      } else {
        board[data.r][data.c] = data.p;
        history.push({ r: data.r, c: data.c, p: data.p });
        last = { r: data.r, c: data.c };
        turn = data.p === 'black' ? 'white' : 'black';
        myTurn = true;
        winCells = [];
        render();
      }
      break;

    case 'undo-req':
      document.getElementById('undoModal').classList.add('show');
      break;

    case 'undo-rep':
      if (data.ok) { execUndo(); toast('悔棋成功 ↩'); }
      else { toast('对手拒绝了悔棋 ❌'); }
      break;

    case 'reset':
      initGame(); render();
      toast('🆕 新一局开始！');
      break;
  }
}

async function createRoom() {
  if (clientConnected) { toast('已在房间中'); return; }
  try {
    await connectMQTT();
    roomId = rndId();
    subscribeTopics();
    myColor = 'black'; myTurn = true; mode = 'online';
    initGame(); render();

    document.getElementById('roomCode').textContent = roomId;
    document.getElementById('onlineInit').style.display = 'none';
    document.getElementById('onlineInfo').style.display = 'flex';
    document.getElementById('onlineBox').classList.add('show');
    document.getElementById('topTitle').innerHTML = '在线联机 · ⚫ 黑棋';
    setBadge('yellow', '⏳ 等待对手加入...');
    toast('房间已创建，复制房间号发给好友');
  } catch (e) {
    toast('连接失败：' + e.message);
    client = null; clientConnected = false;
  }
}

function toggleJoin() {
  const r = document.getElementById('joinRow');
  r.style.display = r.style.display === 'none' ? 'flex' : 'none';
  if (r.style.display === 'flex') document.getElementById('roomInp').focus();
}

async function joinRoom() {
  const rid = document.getElementById('roomInp').value.trim().toUpperCase();
  if (!rid || rid.length !== 6) { toast('请输入6位房间号'); return; }
  if (clientConnected) { toast('已在房间中'); return; }
  try {
    await connectMQTT();
    roomId = rid;
    subscribeTopics();
    myColor = 'white'; myTurn = false; mode = 'online';
    initGame(); render();

    document.getElementById('roomCode').textContent = roomId;
    document.getElementById('onlineInit').style.display = 'none';
    document.getElementById('onlineInfo').style.display = 'flex';
    document.getElementById('onlineBox').classList.add('show');
    document.getElementById('topTitle').innerHTML = '在线联机 · ⚪ 白棋';
    setBadge('green', '✅ 已加入房间');
    // Notify creator
    pub('joined', {});
    toast('已加入房间！等待黑棋落子');
  } catch (e) {
    toast('连接失败：' + e.message);
    client = null; clientConnected = false;
  }
}

function copyRoom() {
  if (!roomId) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(roomId).then(() => toast('✅ 已复制！')).catch(() => fallback(roomId));
  } else { fallback(roomId); }
}
function fallback(t) {
  const ta = document.createElement('textarea');
  ta.value = t; ta.style.cssText = 'position:fixed;left:-9999px;'; document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); toast('✅ 已复制！'); } catch (e) { toast('请手动复制'); }
  document.body.removeChild(ta);
}

function leaveOnline() {
  if (client) { try { client.end(true); } catch(e) {} client = null; clientConnected = false; }
  mode = 'local'; myColor = null; roomId = null; myTurn = true;
  document.getElementById('onlineBox').classList.remove('show');
  document.getElementById('onlineInit').style.display = 'flex';
  document.getElementById('onlineInfo').style.display = 'none';
  document.getElementById('joinRow').style.display = 'none';
  document.getElementById('topTitle').textContent = '本地对战';
  setBadge('', '');
  initGame(); render();
}

function setBadge(cls, msg) {
  const el = document.getElementById('tagArea');
  el.innerHTML = msg ? `<span class="tag ${cls}">${msg}</span>` : '';
}

// ==================== NAVIGATION ====================
function goHome() {
  leaveOnline();
  document.getElementById('home').classList.add('active');
  document.getElementById('game').classList.remove('active');
}

function startGame(m) {
  leaveOnline();
  mode = m;
  initGame();
  document.getElementById('home').classList.remove('active');
  document.getElementById('game').classList.add('active');

  if (m === 'online') {
    document.getElementById('onlineBox').classList.add('show');
    document.getElementById('onlineInit').style.display = 'flex';
    document.getElementById('onlineInfo').style.display = 'none';
    document.getElementById('joinRow').style.display = 'none';
    document.getElementById('topTitle').textContent = '在线联机';
  } else {
    document.getElementById('onlineBox').classList.remove('show');
    document.getElementById('topTitle').textContent = '本地对战';
  }

  setTimeout(resize, 150);
}

// ==================== TOAST ====================
let tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => el.classList.remove('show'), 2200);
}

// ==================== INPUT ====================
function inputPos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = sz / rect.width, sy = sz / rect.height;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    r: Math.round(((cy - rect.top) * sy - pd) / cs),
    c: Math.round(((cx - rect.left) * sx - pd) / cs)
  };
}

canvas.addEventListener('click', e => { const { r, c } = inputPos(e); place(r, c); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); const { r, c } = inputPos(e); place(r, c); }, { passive: false });

window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 400));
document.getElementById('winOverlay').addEventListener('click', function(e) { if (e.target === this) clickReset(); });

// ==================== INIT ====================
document.getElementById('home').classList.add('active');
</script>
</body>
